name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump Version
        id: bump
        run: python3 .github/scripts/bump_version.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Copy Compiled APKs
        run: |
          mkdir -p build_apks
          cp app/build/outputs/apk/debug/app-debug.apk build_apks/haqiqa-v${{ steps.bump.outputs.VERSION_NAME }}.apk
          cp app/build/outputs/apk/debug/app-debug.apk haqiqa.apk

      - name: Commit and Push Version Bump and APKs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts app/src/main/java/com/example/ui/screens/HaqiqaMainScreen.kt build_apks/ haqiqa.apk
          git commit -m "[CI] Automated Release v${{ steps.bump.outputs.VERSION_NAME }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.VERSION_NAME }}
          name: Release v${{ steps.bump.outputs.VERSION_NAME }}
          draft: false
          prerelease: false
          files: |
            haqiqa.apk
            build_apks/haqiqa-v${{ steps.bump.outputs.VERSION_NAME }}.apk
          body: |
            Automated Release for Haqiqa v${{ steps.bump.outputs.VERSION_NAME }} (Build #${{ steps.bump.outputs.VERSION_CODE }})
            
            ### Changes in this Release:
            - Automatically compiled and packaged via GitHub Actions on push to main branch.
            
            ### Download Options:
            - **Latest APK**: [haqiqa.apk](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump.outputs.VERSION_NAME }}/haqiqa.apk)
            - **Versioned APK**: [haqiqa-v${{ steps.bump.outputs.VERSION_NAME }}.apk](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump.outputs.VERSION_NAME }}/haqiqa-v${{ steps.bump.outputs.VERSION_NAME }}.apk)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
