name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Keystore decoded successfully"
          else
            echo "Error: debug.keystore.base64 not found!"
            exit 1
          fi

      - name: Bump Version
        id: bump
        run: |
          python3 - <<'EOF'
          import re, os, sys
          from datetime import datetime
          
          gradle_path = "app/build.gradle.kts"
          with open(gradle_path, "r", encoding="utf-8") as f:
              gradle_content = f.read()

          code_match = re.search(r'versionCode\s*=\s*(\d+)', gradle_content)
          if not code_match:
              print("Error: Could not find versionCode in build.gradle.kts", file=sys.stderr)
              sys.exit(1)
          old_code = int(code_match.group(1))
          new_code = old_code + 1

          name_match = re.search(r'versionName\s*=\s*"([^"]+)"', gradle_content)
          if not name_match:
              print("Error: Could not find versionName in build.gradle.kts", file=sys.stderr)
              sys.exit(1)
          old_name = name_match.group(1)
          
          parts = old_name.split('.')
          if len(parts) >= 3:
              try:
                  patch = int(parts[-1])
                  parts[-1] = str(patch + 1)
                  new_name = '.'.join(parts)
              except ValueError:
                  new_name = old_name + ".1"
          else:
              new_name = old_name + ".1"

          print(f"Bumping versionCode: {old_code} -> {new_code}")
          print(f"Bumping versionName: {old_name} -> {new_name}")

          updated_gradle = re.sub(
              r'(versionCode\s*=\s*)\d+', 
              lambda m: f"{m.group(1)}{new_code}", 
              gradle_content
          )
          updated_gradle = re.sub(
              r'(versionName\s*=\s*)"[^"]+"', 
              lambda m: f'{m.group(1)}"{new_name}"', 
              updated_gradle
          )

          with open(gradle_path, "w", encoding="utf-8") as f:
              f.write(updated_gradle)

          screen_path = "app/src/main/java/com/example/ui/screens/HaqiqaMainScreen.kt"
          if os.path.exists(screen_path):
              with open(screen_path, "r", encoding="utf-8") as f:
                  screen_content = f.read()
              old_beta_str = f"BETA v{old_name}"
              new_beta_str = f"BETA v{new_name}"
              if old_beta_str in screen_content:
                  updated_screen = screen_content.replace(old_beta_str, new_beta_str)
              else:
                  updated_screen = re.sub(r'text\s*=\s*"BETA\s+v[^"]+"', f'text = "BETA v{new_name}"', screen_content)
              with open(screen_path, "w", encoding="utf-8") as f:
                  f.write(updated_screen)

          readme_path = "build_apks/README.md"
          if os.path.exists(readme_path):
              with open(readme_path, "r", encoding="utf-8") as f:
                  readme_content = f.read()
              updated_readme = re.sub(r'### (v\d+\.\d+\.\d+)\s*\(Current Release\)', r'### \1', readme_content)
              today_str = datetime.now().strftime("%B %d, %Y")
              new_release_section = f"### v{new_name} (Current Release)\n- **Release Date**: {today_str}\n- **Features**:\n  - Automated version bump, compilation, and asset release via GitHub Actions.\n- **Artifacts**:\n  - `haqiqa-v{new_name}.apk` (Fully compiled debug APK)\n\n"
              target = "## Versioned Releases\n\n"
              if target in updated_readme:
                  updated_readme = updated_readme.replace(target, target + new_release_section)
              else:
                  updated_readme = updated_readme.replace("## Versioned Releases\n", "## Versioned Releases\n\n" + new_release_section)
              with open(readme_path, "w", encoding="utf-8") as f:
                  f.write(updated_readme)

          github_output = os.environ.get('GITHUB_OUTPUT')
          if github_output:
              with open(github_output, 'a') as f:
                  f.write(f"VERSION_CODE={new_code}\n")
                  f.write(f"VERSION_NAME={new_name}\n")
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Copy Compiled APKs
        run: |
          mkdir -p build_apks
          cp app/build/outputs/apk/debug/app-debug.apk build_apks/haqiqa-v${{ steps.bump.outputs.VERSION_NAME }}.apk
          cp app/build/outputs/apk/debug/app-debug.apk haqiqa.apk

      - name: Commit and Push Version Bump and APKs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts app/src/main/java/com/example/ui/screens/HaqiqaMainScreen.kt build_apks/ haqiqa.apk
          git commit -m "[CI] Automated Release v${{ steps.bump.outputs.VERSION_NAME }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.VERSION_NAME }}
          name: Release v${{ steps.bump.outputs.VERSION_NAME }}
          draft: false
          prerelease: false
          files: |
            haqiqa.apk
            build_apks/haqiqa-v${{ steps.bump.outputs.VERSION_NAME }}.apk
          body: |
            Automated Release for Haqiqa v${{ steps.bump.outputs.VERSION_NAME }} (Build #${{ steps.bump.outputs.VERSION_CODE }})
            
            ### Changes in this Release:
            - Automatically compiled and packaged via GitHub Actions on push to main branch.
            
            ### Download Options:
            - **Latest APK**: [haqiqa.apk](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump.outputs.VERSION_NAME }}/haqiqa.apk)
            - **Versioned APK**: [haqiqa-v${{ steps.bump.outputs.VERSION_NAME }}.apk](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump.outputs.VERSION_NAME }}/haqiqa-v${{ steps.bump.outputs.VERSION_NAME }}.apk)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
